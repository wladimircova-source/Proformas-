<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Presupuestos, Proformas y Notas - COVA</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container { width: 100%; max-width: 1000px; }
        .text-center { text-align: center; }
        .flex-col { display: flex; flex-direction: column; align-items: center; }
        .mb-6 { margin-bottom: 24px; }
        .mb-4 { margin-bottom: 16px; }
        .gap-2 { gap: 8px; }
        
        h1 { color: #ffffff; font-size: 24px; margin: 0; font-weight: 700; }
        .back-link { color: #8b949e; font-size: 14px; text-decoration: none; }
        .back-link:hover { color: #58a6ff; }
        
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        h2 { color: #ffffff; font-size: 16px; margin-top: 0; margin-bottom: 16px; font-weight: 700; }
        
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .grid-mix { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }

        .bg-box { background-color: rgba(13, 17, 23, 0.4); padding: 12px; border-radius: 6px; border: 1px solid #21262d; }
        
        label { display: block; font-size: 12px; font-weight: 700; color: #8b949e; margin-bottom: 6px; }
        .lbl-blue { color: #58a6ff; }
        .lbl-amber { color: #d29922; }
        .lbl-red { color: #ff7b72; }

        .input-field {
            width: 100%;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .input-field:focus { border-color: #58a6ff; outline: none; }
        
        .switch-container { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .switch-container input { width: 16px; height: 16px; cursor: pointer; }

        .fila-articulo { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .w-cant { width: 80px; text-align: center; font-family: monospace; }
        .w-flex { flex: 1; text-transform: uppercase; }
        .w-precio { width: 120px; text-align: right; font-family: monospace; }
        
        .btn-remove-row { background: none; border: none; color: #f85149; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-link { background: none; border: none; color: #58a6ff; font-size: 13px; font-weight: 700; cursor: pointer; padding: 0; }
        
        .totals-section { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid #21262d; margin-top: 16px; }
        .total-bs { font-family: monospace; font-weight: 700; color: #d29922; font-size: 16px; }
        .total-usd { font-size: 24px; font-weight: 900; color: #ffffff; }

        .btn-group { display: flex; gap: 8px; margin-top: 16px; }
        .btn-submit { flex: 1; background-color: #238636; border: 1px solid #2ea44f; color: #ffffff; font-weight: 700; padding: 12px; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .btn-submit:hover { background-color: #2ea44f; }
        .btn-cancel { background-color: #21262d; border: 1px solid #30363d; color: #c9d1d9; font-weight: 700; padding: 12px; border-radius: 6px; cursor: pointer; display: none; }

        /* Historial */
        .overflow-table { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th { background-color: #161b22; color: #8b949e; padding: 12px; border-bottom: 2px solid #30363d; }
        td { padding: 12px; border-bottom: 1px solid #21262d; color: #c9d1d9; }
        .td-num { font-family: monospace; font-weight: bold; color: #58a6ff; }
        .td-total { font-family: monospace; font-weight: bold; color: #3fb950; text-align: right; }
        .actions-cell { display: flex; gap: 6px; justify-content: center; }
        
        .btn-action { border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 12px; cursor: pointer; color: white; }
        .btn-p { background-color: #1f6feb; }
        .btn-e { background-color: #9e6a03; }
        .btn-d { background-color: #da3633; }

        /* IMPRESIÓN */
        #print-area { display: none; background: white; color: black; padding: 20px; font-size: 12px; }
        .p-header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 12px; margin-bottom: 16px; }
        .p-client-box { border: 1px solid #ccc; padding: 8px; background-color: #f9f9f9; border-radius: 4px; margin-top: 8px; max-width: 450px; }
