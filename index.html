<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Presupuestos, Proformas y Notas - COVA</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .card { background-color: #161b22; border: 1px solid #30363d; }
        .input-field { background-color: #0d1117; border: 1px solid #30363d; color: #c9d1d9; }
        .input-field:focus { border-color: #58a6ff; outline: none; }
        th { background-color: #161b22; color: #8b949e; border-bottom: 2px solid #30363d; }
        td { border-bottom: 1px solid #21262d; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col justify-center items-center gap-2 mb-6">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                📄 Generador de Presupuestos, Proformas y Notas
            </h1>
            <a href="index.html" class="text-sm text-gray-400 hover:text-blue-400 transition">⬅ Volver al Control de Órdenes</a>
        </div>

        <!-- Formulario principal de Documentos -->
        <div class="card p-6 rounded-xl shadow-lg mb-6">
            <h2 id="form-titulo" class="text-md font-bold text-white mb-4">Nuevo Documento</h2>
            <form id="doc-form" class="space-y-4">
                <input type="hidden" id="edit_id" value="">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Tipo de Documento</label>
                        <select id="tipo_doc" class="w-full input-field rounded p-2 text-sm text-white font-semibold">
                            <option value="PRESUPUESTO">PRESUPUESTO (PRE)</option>
                            <option value="PROFORMA_VE">PROFORMA (Nacional)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Empresa Emisora</label>
                        <select id="empresa_emisora" class="w-full input-field rounded p-2 text-sm text-white">
                            <option value="SOLUCIONES 360">SOLUCIONES INTEGRALES 360 F.P.</option>
                            <option value="SECURITY MALLORY">SECURITY MALLORY 360 C.A.</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-400 mb-1">Cliente / Empresa Compradora</label>
                        <input type="text" id="cliente_doc" required placeholder="Ej: VISCO ORINOCO, C.A." class="w-full input-field rounded p-2 text-sm uppercase">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">RIF / Identificación</label>
                        <input type="text" id="rif_doc" placeholder="Ej: J-12345678-9" class="w-full input-field rounded p-2 text-sm uppercase">
                    </div>
                </div>

                <!-- Sección Dinámica de Artículos -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2">Artículos / Servicios</label>
                    <div id="contenedor-filas" class="space-y-2">
                        <!-- Aquí se inyectan las filas dinámicamente -->
                    </div>
                    <button type="button" id="btn-add-fila" class="mt-2 text-xs font-bold text-blue-400 hover:text-blue-300 transition flex items-center gap-1">
                        + Añadir fila
                    </button>
                </div>

                <!-- Visualización del Total Calculado -->
                <div class="pt-4 border-t border-gray-800 flex justify-end items-center">
                    <div class="text-right">
                        <span class="text-sm font-bold text-gray-400">Total:</span>
                        <span id="total-global-view" class="text-2xl font-black text-white ml-2">$ 0.00</span>
                    </div>
                </div>

                <div class="flex gap-2 pt-2">
                    <button type="button" id="btn-cancelar" class="w-1/4 bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold py-2 rounded text-xs transition hidden">Cancelar</button>
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded text-sm tracking-wide uppercase transition">GENERAR DOCUMENTO</button>
                </div>
            </form>
        </div>

        <!-- Historial de Emitidos -->
        <div class="card p-6 rounded-xl shadow-lg">
            <h2 class="text-md font-bold text-white mb-4">Historial de Emitidos</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs whitespace-nowrap">
                    <thead>
                        <tr>
                            <th class="p-3">Numeración</th>
                            <th class="p-3">Tipo</th>
                            <th class="p-3">Cliente</th>
                            <th class="p-3 text-right">Monto Total</th>
                            <th class="p-3 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-documentos">
                        <!-- Controlado por Firebase -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Script unificado con alcance global explícito -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_1qzfNPRuU8Fz4quhWIFVfIZGggI7r9A",
            authDomain: "operaciones-e645f.firebaseapp.com",
            projectId: "operaciones-e645f",
            storageBucket: "operaciones-e645f.firebasestorage.app",
            messagingSenderId: "791459219171",
            appId: "1:791459219171:web:93236902494f2cdc63e7d6",
            measurementId: "G-YPK15ZLJ3C"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = collection(db, "documentos_cova");

        let listaDocumentos = [];
        let totalCalculadoUSD = 0;

        // Obligamos a la función a ser global
        window.agregarFilaArticulo = function(cant = '', desc = '', precio = '') {
            const contenedor = document.getElementById('contenedor-filas');
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center fila-articulo";
            div.innerHTML = `
                <input type="number" placeholder="Cant" value="${cant}" required class="w-16 input-field rounded p-1.5 text-xs text-center font-mono item-cant">
                <input type="text" placeholder="Descripción del artículo" value="${desc}" required class="flex-1 input-field rounded p-1.5 text-xs uppercase item-desc">
                <input type="number" step="0.01" placeholder="Precio $" value="${precio}" required class="w-24 input-field rounded p-1.5 text-xs text-right font-mono item-precio">
                <button type="button" class="btn-eliminar-fila text-red-500 hover:text-red-400 font-bold px-2 text-sm">✕</button>
            `;
            
            div.querySelector('.item-cant').addEventListener('input', calcularTotalGlobal);
            div.querySelector('.item-precio').addEventListener('input', calcularTotalGlobal);
            div.querySelector('.btn-eliminar-fila').addEventListener('click', function() {
                div.remove();
                calcularTotalGlobal();
            });

            contenedor.appendChild(div);
            calcularTotalGlobal();
        };

        function calcularTotalGlobal() {
            let total = 0;
            const filas = document.querySelectorAll('.fila-articulo');
            filas.forEach(f => {
                const c = parseFloat(f.querySelector('.item-cant').value) || 0;
                const p = parseFloat(f.querySelector('.item-precio').value) || 0;
                total += (c * p);
            });
            totalCalculadoUSD = total;
            document.getElementById('total-global-view').innerText = `$ ${total.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
        }

        document.getElementById('btn-add-fila').addEventListener('click', () => window.agregarFilaArticulo());

        onSnapshot(query(docRef, orderBy("creadoEn", "desc")), (snapshot) => {
            listaDocumentos = [];
            snapshot.forEach((snap) => {
                listaDocumentos.push({ id: snap.id, ...snap.data() });
            });
            renderTablaDocs();
        });

        document.getElementById('doc-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit_id').value;
            const tipo = document.getElementById('tipo_doc').value;

            const items = [];
            document.querySelectorAll('.fila-articulo').forEach(f => {
                items.push({
                    cant: parseFloat(f.querySelector('.item-cant').value) || 0,
                    descripcion: f.querySelector('.item-desc').value.toUpperCase(),
                    precio: parseFloat(f.querySelector('.item-precio').value) || 0
                });
            });

            const dataObj = {
                tipo: tipo,
                empresaEmisora: document.getElementById('empresa_emisora').value,
                cliente: document.getElementById('cliente_doc').value.toUpperCase(),
                rif: document.getElementById('rif_doc').value.toUpperCase() || 'N/A',
                items: items,
                total: totalCalculadoUSD
            };

            if (editId) {
                await updateDoc(doc(db, "documentos_cova", editId), dataObj);
                cancelarEdicion();
            } else {
                const totalDeEsteTipo = listaDocumentos.filter(d => d.tipo === tipo).length;
                const prefijo = tipo === "PRESUPUESTO" ? "PRE" : "PROF";
                
                dataObj.numeroDocumento = `${prefijo}-${(totalDeEsteTipo + 1).toString().padStart(4, '0')}`;
                dataObj.fecha = new Date().toLocaleDateString('es-ES');
                dataObj.creadoEn = new Date().toISOString();

                await addDoc(docRef, dataObj);
            }

            document.getElementById('doc-form').reset();
            document.getElementById('contenedor-filas').innerHTML = "";
            window.agregarFilaArticulo(); 
        });

        // Hacemos explícitamente globales las funciones de la tabla
        window.editarDocumentoLocal = function(id) {
            const d = listaDocumentos.find(doc => doc.id === id);
            if(!d) return;

            document.getElementById('edit_id').value = d.id;
            document.getElementById('tipo_doc').value = d.tipo;
            document.getElementById('empresa_emisora').value = d.empresaEmisora;
            document.getElementById('cliente_doc').value = d.cliente;
            document.getElementById('rif_doc').value = d.rif;

            const contenedor = document.getElementById('contenedor-filas');
            contenedor.innerHTML = "";
            
            if(d.items && d.items.length > 0) {
                d.items.forEach(it => window.agregarFilaArticulo(it.cant, it.descripcion, it.precio));
            } else {
                window.agregarFilaArticulo();
            }

            document.getElementById('form-titulo').innerText = `✏️ Editando: ${d.numeroDocumento}`;
            document.getElementById('btn-cancelar').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.borrarDocumentoLocal = async function(id) {
            if(confirm("⚠️ ¿Eliminar permanentemente este registro?")) {
                await deleteDoc(doc(db, "documentos_cova", id));
            }
        };

        function cancelarEdicion() {
            document.getElementById('edit_id').value = "";
            document.getElementById('doc-form').reset();
            document.getElementById('contenedor-filas').innerHTML = "";
            document.getElementById('form-titulo').innerText = "Nuevo Documento";
            document.getElementById('btn-cancelar').classList.add('hidden');
            window.agregarFilaArticulo();
        }
        document.getElementById('btn-cancelar').addEventListener('click', cancelarEdicion);

        function renderTablaDocs() {
            const tbody = document.getElementById('tabla-documentos');
            tbody.innerHTML = "";

            listaDocumentos.forEach(d => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-800/50 transition";
                tr.innerHTML = `
                    <td class="p-3 font-mono font-bold text-blue-400">${d.numeroDocumento}</td>
                    <td class="p-3 font-bold text-gray-400 text-[10px]">${d.tipo}</td>
                    <td class="p-3 font-semibold text-white">${d.cliente}</td>
                    <td class="p-3 text-right text-emerald-400 font-bold">$ ${(d.total || 0).toLocaleString('en-US', {minimumFractionDigits:2})}</td>
                    <td class="p-3 text-center flex justify-center gap-2">
                        <button onclick="window.editarDocumentoLocal('${d.id}')" class="bg-amber-600 hover:bg-amber-500 text-white px-2 py-1 rounded text-xs font-bold cursor-pointer">✏️ Editar</button>
                        <button onclick="window.borrarDocumentoLocal('${d.id}')" class="bg-red-700 hover:bg-red-600 text-white px-2 py-1 rounded text-xs font-bold cursor-pointer">🗑️ Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Cargar primera fila al inicio
        window.agregarFilaArticulo();
    </script>
</body>
</html>
