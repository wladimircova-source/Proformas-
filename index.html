<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Presupuestos, Proformas y Notas - COVA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .card { background-color: #161b22; border: 1px solid #30363d; }
        .input-field { background-color: #0d1117; border: 1px solid #30363d; color: #c9d1d9; }
        .input-field:focus { border-color: #58a6ff; outline: none; }
        th { background-color: #161b22; color: #8b949e; border-bottom: 2px solid #30363d; }
        td { border-bottom: 1px solid #21262d; }
        
        @media print {
            body { background-color: white; color: black; padding: 0; }
            .no-print { display: none !important; }
            .print-view { display: block !important; }
            .card { border: none; background: transparent; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="main-ui" class="no-print max-w-5xl mx-auto">
        <div class="flex flex-col justify-center items-center gap-2 mb-6">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                📄 Generador de Presupuestos, Proformas y Notas
            </h1>
            <p class="text-xs text-gray-400">Sistema Local para GitHub Pages</p>
        </div>

        <div class="card p-6 rounded-xl shadow-lg mb-6">
            <h2 id="form-titulo" class="text-md font-bold text-white mb-4">Nuevo Documento</h2>
            <form id="doc-form" class="space-y-4">
                <input type="hidden" id="edit_id" value="">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Tipo de Documento</label>
                        <select id="tipo_doc" class="w-full input-field rounded p-2 text-sm text-white font-semibold">
                            <option value="PRESUPUESTO">PRESUPUESTO (PRE)</option>
                            <option value="PROFORMA">PROFORMA (PROF)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Empresa Emisora</label>
                        <select id="empresa_emisora" class="w-full input-field rounded p-2 text-sm text-white">
                            <option value="SOLUCIONES INTEGRALES 360 F.P.">SOLUCIONES INTEGRALES 360 F.P.</option>
                            <option value="SECURITY MALLORY 360 C.A.">SECURITY MALLORY 360 C.A.</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 bg-gray-900/40 p-3 rounded border border-gray-800">
                    <div>
                        <label class="block text-[11px] font-bold text-blue-400 mb-1">Orden de Compra (O.C.)</label>
                        <input type="text" id="orden_compra" placeholder="Ej: 006059/2026" class="w-full input-field rounded p-1.5 text-xs uppercase font-mono">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-amber-400 mb-1">Tasa Oficial (BCV)</label>
                        <input type="number" step="0.01" id="tasa_bcv" value="1.00" required class="w-full input-field rounded p-1.5 text-xs text-center font-bold text-white font-mono">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 mb-1">Tipo de Moneda</label>
                        <input type="text" id="tipo_moneda" value="DOLAR USD" class="w-full input-field rounded p-1.5 text-xs text-center font-semibold uppercase">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-400 mb-1">Cliente / Empresa Compradora</label>
                        <input type="text" id="cliente_doc" required placeholder="Ej: VISCO ORINOCO, C.A." class="w-full input-field rounded p-2 text-sm uppercase">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">RIF / Identificación</label>
                        <input type="text" id="rif_doc" placeholder="Ej: J-1
